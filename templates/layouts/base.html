<!DOCTYPE html>
<html lang="en">

<head>
  {% block title %}
    <title>
      {% block subtitle %}{% endblock %}
      IT Task Manager
    </title>
  {% endblock %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  {% load static %}
  <link rel="icon" href="{% static 'assets/images/favicon_.ico' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="app-body">
<div class="container-fluid px-0">
  <div class="row no-gutters min-vh-100">
    <aside class="col-12 col-md-3 col-lg-2 app-sidebar {% block page_sidebar_col_class %}{% endblock %}">
      {% block sidebar %}
        {% include 'includes/sidebar.html' %}
      {% endblock %}
    </aside>

    <main class="col-12 col-md-9 col-lg-10 app-content {% block page_content_col_class %}{% endblock %}">
      {% block content %}
      {% endblock %}

      {% block pagination %}
        {% include "includes/pagination.html" %}
      {% endblock %}
    </main>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
