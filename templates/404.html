{% extends "layouts/base.html" %}
{% load static %}

{% block title %}<title>Page not found</title>{% endblock %}

{% block content %}
  <div class="dashboard-wrapper py-4 px-2 px-md-3">
    <div class="dashboard-card">
      <div class="card-body p-3 p-md-4">
        <div class="error-page-card text-center">
          <img src="{% static 'assets/images/404.jpg' %}" alt="404 illustration" class="error-illustration">
          <div class="error-code mt-2">404</div>
          <h1 class="dashboard-title mb-2">Page not found</h1>
          <p class="dashboard-subtitle mb-3">Oops! The page you are looking for does not exist.</p>
          <a href="{% url 'task-manager:index' %}" class="btn btn-sm btn-add-soft">Go to homepage</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
