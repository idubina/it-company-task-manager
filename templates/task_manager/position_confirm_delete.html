{% extends "layouts/base.html" %}

{% block content %}
  <h1>Delete position?</h1>
  <p class="lead">Are you sure you want to delete the position: {{ position }}?</p>
  <form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Yes" class="btn btn-danger">
    <a class="btn btn-dark" href="{% url 'task-manager:position-detail' pk=position.id %}">Cancel</a>
  </form>
{% endblock %}
