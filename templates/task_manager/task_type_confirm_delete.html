{% extends "base.html" %}

{% block content %}
  <h1>Delete task type?</h1>
  <p class="lead">Are you sure you want to delete the task type: {{ tasktype }}?</p>
  <form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Yes" class="btn btn-danger">
    <a class="btn btn-dark" href="{% url 'task-manager:task-type-list' %}">Cancel</a>
  </form>
{% endblock %}
