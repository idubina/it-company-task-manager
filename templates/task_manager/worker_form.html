{% extends "layouts/base.html" %}

{% block subtitle %}{{ object|yesno:"Update Position, Create Worker" }} - {% endblock %}
{% block content %}
  <div class="dashboard-wrapper py-4 px-2 px-md-3">
    <div class="dashboard-card">
      <div class="card-body p-3 p-md-4">
        <div class="mb-3">
          <h1 class="dashboard-title mb-1">
            {% if object %}
              <i class="bi bi-pencil-square page-title-icon"></i>
              Update worker position
            {% else %}
              <i class="bi bi-person-plus page-title-icon"></i>
              Create worker
            {% endif %}
          </h1>
          <p class="dashboard-subtitle mb-0">Worker form</p>
        </div>

        <div class="task-detail-section">
          {% include "includes/form.html" %}
        </div>
      </div>
    </div>
  </div>
{% endblock %}
