{% extends "base.html" %}

{% block content %}
  <h1>Delete team?</h1>
  <p class="lead">Are you sure you want to delete the team: {{ team }}?</p>
  <p><i>All Projects & Tasks of this team will be also deleted!</i></p>
  <form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Yes" class="btn btn-danger">
    <a class="btn btn-dark" href="{% url 'task-manager:team-detail' pk=team.id %}">Cancel</a>
  </form>
{% endblock %}
