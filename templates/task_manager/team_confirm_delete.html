{% extends "layouts/base.html" %}

{% block content %}
  <div class="dashboard-wrapper py-4 px-2 px-md-3">
    <div class="dashboard-card">
      <div class="card-body p-3 p-md-4">
        <div class="delete-card">
          <h1 class="dashboard-title mb-2">Delete team?</h1>
          <p class="delete-text mb-2">Are you sure you want to delete the team: <strong>{{ team }}</strong>?</p>
          <p class="delete-warning mb-3">All Projects & Tasks of this team will be also deleted!</p>

          <form action="" method="post" class="delete-actions">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-sm">Yes</button>
            <a class="btn btn-dark btn-sm" href="{% url 'task-manager:team-detail' pk=team.id %}">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
