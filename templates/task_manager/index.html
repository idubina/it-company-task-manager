{% extends "layouts/base.html" %}

{% block content %}
  <div class="dashboard-wrapper py-4 px-2 px-md-3">
    <div class="text-center mb-4 mb-md-5">
      <h1 class="dashboard-title mb-2">Task Manager Home</h1>
      <p class="dashboard-subtitle mb-0">Welcome to the best task manager ever!</p>
    </div>

    <div class="row">
      <div class="col-12 col-sm-6 col-lg-6 mb-3">
        <div class="card dashboard-card dashboard-card-lg h-100">
          <div class="card-body text-center d-flex flex-column justify-content-center">
            <i class="bi bi-diagram-3 dashboard-icon mb-3"></i>
            <p class="stat-label mb-2">Teams</p>
            <h2 class="stat-value-lg mb-0">{{ num_teams }}</h2>
          </div>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-6 mb-3">
        <div class="card dashboard-card dashboard-card-lg h-100">
          <div class="card-body text-center d-flex flex-column justify-content-center">
            <i class="bi bi-folder dashboard-icon mb-3"></i>
            <p class="stat-label mb-2">Projects</p>
            <h2 class="stat-value-lg mb-0">{{ num_projects }}</h2>
          </div>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-4 mb-3">
        <div class="card dashboard-card dashboard-card-lg h-100">
          <div class="card-body text-center d-flex flex-column justify-content-center">
            <i class="bi bi-list-check dashboard-icon mb-3"></i>
            <p class="stat-label mb-2">Tasks</p>
            <h2 class="stat-value-lg mb-0">{{ num_tasks }}</h2>
          </div>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-4 mb-3">
        <div class="card dashboard-card dashboard-card-lg h-100">
          <div class="card-body text-center d-flex flex-column justify-content-center">
            <i class="bi bi-people dashboard-icon mb-3"></i>
            <p class="stat-label mb-2">Workers</p>
            <h2 class="stat-value-lg mb-0">{{ num_workers }}</h2>
          </div>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-4 mb-3">
        <div class="card dashboard-card dashboard-card-lg h-100">
          <div class="card-body text-center d-flex flex-column justify-content-center">
            <i class="bi bi-briefcase dashboard-icon mb-3"></i>
            <p class="stat-label mb-2">Positions</p>
            <h2 class="stat-value-lg mb-0">{{ num_positions }}</h2>
          </div>
        </div>
      </div>
      
    </div>
  </div>
{% endblock %}
